services:
  backend:
    build:
      context: ./backend
    container_name: notification-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=8080

  simulator:
    build:
      context: ./simulator
    container_name: notification-simulator
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8080

  frontend:
    build:
      context: ./frontend
    container_name: notification-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
