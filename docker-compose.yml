services:
  backend:
    build:
      context: ./backend
    container_name: notification-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=8080

  connector:
    build:
      context: ./connector
    container_name: notification-connector
    ports:
      - "8090:8090"
    depends_on:
      - backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=8090
      - BACKEND_URL=http://backend:8080
      - CONNECTOR_SOURCES=webhook,websocket
      - WEBSOCKET_SOURCE_URL=ws://simulator:7001/ws

  simulator:
    build:
      context: ./simulator
    container_name: notification-simulator
    ports:
      - "7001:7001"
    depends_on:
      - connector
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=7001
      - CONNECTOR_WEBHOOK_URL=http://connector:8090/webhook

  frontend:
    build:
      context: ./frontend
    container_name: notification-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
